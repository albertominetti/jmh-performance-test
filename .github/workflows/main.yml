name: Java build CI
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: 21
        distribution: 'temurin'
    - name: Compile with Maven
      run: mvn -B -U compile
    - name: Test
      run: mvn -B -U test
